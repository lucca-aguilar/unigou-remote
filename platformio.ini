[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino

debug_tool = cmsis-dap
build_type = debug
monitor_speed = 115200

build_flags =
    -D configUSE_TRACE_FACILITY=1
    -D configGENERATE_RUN_TIME_STATS=1
    -D configUSE_MUTEXES=1
    -D configTOTAL_HEAP_SIZE=0x3000
    -D portCONFIGURE_TIMER_FOR_RUN_TIME_STATS()=runtime_stats_timer_init()
    -D portGET_RUN_TIME_COUNTER_VALUE()=runtime_stats_timer_get_value()
    -D traceTASK_SWITCHED_OUT()=log_context_switch_out()
    -D traceTASK_SWITCHED_IN()=log_context_switch_in()